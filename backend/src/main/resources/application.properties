# ============================================
# AI Career Coach Platform — Backend Config
# ============================================

# Server
server.port=8080
server.servlet.context-path=/api/v1

# ============================================
# Database — PostgreSQL
# ============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/ai_career_coach
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# ============================================
# JPA / Hibernate
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ============================================
# JWT Security
# ============================================
# 256-bit Base64-encoded secret (override via env variable in production)
app.security.jwt-secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
# Token expiry: 24 hours in milliseconds
app.security.jwt-expiration=86400000

# ============================================
# Logging
# ============================================
logging.level.com.aicareercoach=DEBUG
logging.level.org.springframework.security=INFO

# ============================================
# File Upload Configuration
# ============================================
app.upload.dir=uploads/resumes
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ============================================
# OpenAI API Configuration
# ============================================
app.openai.api-key=${OPENAI_API_KEY:}
app.openai.model=${OPENAI_MODEL:gpt-4o-mini}
app.openai.url=https://api.openai.com/v1/chat/completions
